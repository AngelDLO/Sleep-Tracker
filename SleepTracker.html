<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App de Sueño PRO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600&family=Sora:wght@700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #0b0f1a;
    --card: #1f2937;
    --accent: #38bdf8;
    --text: #ffffff;
    --muted: rgba(255,255,255,0.35);
}

body {
    background: linear-gradient(135deg, var(--bg), #111827);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    padding: 50px 20px 60px;
    min-height: 100vh;
    transition: background 0.8s ease;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(1.04); }
    to   { opacity: 1; transform: scale(1); }
}

h1 {
    font-family: 'Sora', sans-serif;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
}

.subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
}

#avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    margin: 0 auto 28px;
    transition: transform 0.3s ease, filter 0.4s ease;
    user-select: none;
}

.labels {
    display: flex;
    justify-content: center;
    gap: 90px;
    margin-bottom: 8px;
}

.labels span {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    width: 90px;
    text-align: center;
}

.picker {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
}

.separator {
    font-size: 1.8rem;
    color: var(--muted);
    padding-bottom: 4px;
    user-select: none;
}

.picker-group {
    display: flex;
    gap: 6px;
}

.wheel {
    width: 72px;
    height: 200px;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    border-radius: 14px;
    background: var(--card);
    position: relative;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
}

.wheel::-webkit-scrollbar { display: none; }

.wheel-inner {
    padding: 80px 0;
}

.item {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: center;
    font-size: 17px;
    color: var(--muted);
    transition: color 0.15s, font-size 0.15s, opacity 0.15s;
    cursor: pointer;
    user-select: none;
}

.item.active {
    font-size: 24px;
    color: var(--accent);
    font-weight: 600;
}

.wheel::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 8px;
    right: 8px;
    height: 40px;
    transform: translateY(-50%);
    border-top: 1.5px solid var(--accent);
    border-bottom: 1.5px solid var(--accent);
    pointer-events: none;
    opacity: 0.5;
    border-radius: 2px;
}

.wheel::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        var(--card) 0%,
        transparent 35%,
        transparent 65%,
        var(--card) 100%
    );
    pointer-events: none;
    z-index: 1;
    border-radius: 14px;
}

button {
    padding: 12px 36px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #0b0f1a;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(56,189,248,0.3);
}

button:hover  { transform: scale(1.06); box-shadow: 0 6px 28px rgba(56,189,248,0.5); }
button:active { transform: scale(0.97); }

#resultado {
    margin-top: 22px;
    font-size: 1.2rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.4s ease;
    min-height: 1.5rem;
}

#horas-display {
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 6px;
    min-height: 1.2rem;
    transition: opacity 0.4s;
    opacity: 0;
}

#barra {
    width: 300px;
    max-width: 90%;
    height: 10px;
    background: var(--card);
    margin: 18px auto 0;
    border-radius: 99px;
    overflow: hidden;
}

#progreso {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #818cf8);
    transition: width 0.7s cubic-bezier(.23,1,.32,1);
    border-radius: 99px;
}
</style>
</head>
<body>

<h1>🌙 Sleep Tracker</h1>
<p class="subtitle">¿Cuánto dormiste?</p>

<div id="avatar">😴</div>

<div class="labels">
    <span>Me dormí</span>
    <span></span>
    <span>Me desperté</span>
</div>

<div class="picker">
    <div class="picker-group">
        <div class="wheel" id="wHDormir"><div class="wheel-inner" id="iHDormir"></div></div>
        <div class="wheel" id="wAmpmDormir"><div class="wheel-inner" id="iAmpmDormir"></div></div>
    </div>

    <div class="separator">→</div>

    <div class="picker-group">
        <div class="wheel" id="wHDespertar"><div class="wheel-inner" id="iHDespertar"></div></div>
        <div class="wheel" id="wAmpmDespertar"><div class="wheel-inner" id="iAmpmDespertar"></div></div>
    </div>
</div>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>
<p id="horas-display"></p>

<div id="barra"><div id="progreso"></div></div>

<script>
function fillWheel(innerId, values, repeat) {
    const inner = document.getElementById(innerId);
    const times = repeat ? 40 : 1;
    for (let r = 0; r < times; r++) {
        values.forEach(v => {
            const div = document.createElement("div");
            div.className = "item";
            div.textContent = v;
            inner.appendChild(div);
        });
    }
}

const HORAS = Array.from({length: 12}, (_, i) => String(i + 1).padStart(2, ' '));
const AMPM  = ["AM", "PM"];

fillWheel("iHDormir",      HORAS, true);
fillWheel("iHDespertar",   HORAS, true);
fillWheel("iAmpmDormir",   AMPM,  true);
fillWheel("iAmpmDespertar",AMPM,  true);

function centerWheel(wheelId, values) {
    const wheel = document.getElementById(wheelId);
    const midBlock = 20;
    wheel.scrollTop = midBlock * values.length * 40;
}

centerWheel("wHDormir",      HORAS);
centerWheel("wHDespertar",   HORAS);
centerWheel("wAmpmDormir",   AMPM);
centerWheel("wAmpmDespertar",AMPM);

function updateActive(wheel) {
    const items     = wheel.querySelectorAll(".item");
    const centerPos = wheel.scrollTop + wheel.offsetHeight / 2;

    let closest = null;
    let minDiff = Infinity;

    items.forEach(item => {
        const itemCenter = item.offsetTop + item.offsetHeight / 2;
        const diff = Math.abs(centerPos - itemCenter);
        if (diff < minDiff) { minDiff = diff; closest = item; }
    });

    items.forEach(i => i.classList.remove("active"));
    if (closest) closest.classList.add("active");
}

function snapToNearest(wheel) {
    const items     = wheel.querySelectorAll(".item");
    const centerPos = wheel.scrollTop + wheel.offsetHeight / 2;

    let closest = null;
    let minDiff = Infinity;

    items.forEach(item => {
        const diff = Math.abs((item.offsetTop + 20) - centerPos);
        if (diff < minDiff) { minDiff = diff; closest = item; }
    });

    if (closest) {
        const target = closest.offsetTop - wheel.offsetHeight / 2 + 20;
        wheel.scrollTo({ top: target, behavior: "smooth" });
    }
}

const allWheels = ["wHDormir","wAmpmDormir","wHDespertar","wAmpmDespertar"];

allWheels.forEach(id => {
    const w = document.getElementById(id);
    let scrollTimer;

    w.addEventListener("scroll", () => {
        updateActive(w);
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => snapToNearest(w), 120);
    });
});

function getVal(wheelId) {
    const w      = document.getElementById(wheelId);
    const active = w.querySelector(".item.active");
    if (!active) {
        updateActive(w);
        return w.querySelector(".item.active")?.textContent?.trim() ?? "12";
    }
    return active.textContent.trim();
}

function to24(h, ampm) {
    h = parseInt(h);
    if (ampm === "PM" && h !== 12) h += 12;
    if (ampm === "AM" && h === 12) h = 0;
    return h;
}

function calcular() {
    const hDormir     = getVal("wHDormir");
    const amDormir    = getVal("wAmpmDormir");
    const hDespertar  = getVal("wHDespertar");
    const amDespertar = getVal("wAmpmDespertar");

    const inicio = to24(hDormir,    amDormir);
    const fin    = to24(hDespertar, amDespertar);

    let total = fin - inicio;
    if (total <= 0) total += 24;

    let mensaje, emoji, bgGradient;

    if (total >= 8) {
        mensaje    = "¡Sueño perfecto! 😊";
        emoji      = "😄";
        bgGradient = "linear-gradient(135deg, #052e16, #14532d)";
    } else if (total >= 6) {
        mensaje    = "Aceptable, pero podrías dormir más 😐";
        emoji      = "😐";
        bgGradient = "linear-gradient(135deg, #1c1200, #422006)";
    } else {
        mensaje    = "¡Muy poco sueño! Descansa más 💀";
        emoji      = "😵";
        bgGradient = "linear-gradient(135deg, #1a0000, #450a0a)";
    }

    document.body.style.background = bgGradient;

    const avatar = document.getElementById("avatar");
    avatar.textContent = emoji;
    avatar.style.transform = "scale(1.4) rotate(10deg)";
    setTimeout(() => avatar.style.transform = "scale(1) rotate(0deg)", 350);

    const r = document.getElementById("resultado");
    const d = document.getElementById("horas-display");

    r.style.opacity = "0";
    d.style.opacity = "0";

    setTimeout(() => {
        r.textContent   = mensaje;
        d.textContent   = `Dormiste ${total} hora${total !== 1 ? "s" : ""}`;
        r.style.opacity = "1";
        d.style.opacity = "1";
    }, 150);

    const p = document.getElementById("progreso");
    const pct = Math.min((total / 8) * 100, 100);
    p.style.width = "0%";
    setTimeout(() => p.style.width = pct + "%", 150);
}

setTimeout(() => {
    allWheels.forEach(id => updateActive(document.getElementById(id)));
}, 200);
</script>

</body>
</html>
